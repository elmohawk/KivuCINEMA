<section class="hero">

    <!-- Dynamic Background -->
    <div class="hero-background">

        <img
            id="heroBackdrop"
            src=""
            alt="Featured Movie">

        <div class="hero-overlay"></div>

    </div>

    <!-- Hero Content -->

    <div class="container hero-content">

        <!-- Left -->

        <div class="hero-info">

            <!-- Featured Badge -->

            <div class="hero-badge">

                <i class="fa-solid fa-fire"></i>

                Featured Movie

            </div>

            <!-- Movie Title -->

            <h1 id="heroTitle">

                Loading...

            </h1>

            <!-- Meta -->

            <div class="hero-meta">

                <span>

                    <i class="fa-solid fa-star"></i>

                    <span id="heroRating">0.0</span>

                </span>

                <span id="heroYear">

                    2026

                </span>

                <span id="heroRuntime">

                    120 min

                </span>

                <span id="heroLanguage">

                    English

                </span>

            </div>

            <!-- Genres -->

            <div
                id="heroGenres"
                class="hero-genres">

            </div>

            <!-- Overview -->

            <p id="heroOverview">

                Loading movie description...

            </p>

            <!-- Buttons -->

            <div class="hero-buttons">

                <a
                    id="watchNowBtn"
                    href="#"
                    class="btn btn-primary">

                    <i class="fa-solid fa-play"></i>

                    Watch Now

                </a>

                <button
                    id="myListBtn"
                    class="btn btn-secondary">

                    <i class="fa-solid fa-plus"></i>

                    My List

                </button>

                <button
                    id="trailerBtn"
                    class="btn btn-ghost">

                    <i class="fa-brands fa-youtube"></i>

                    Trailer

                </button>

            </div>

        </div>

        <!-- Right Poster -->

        <div class="hero-poster">

            <img

                id="heroPoster"

                src=""

                alt="Movie Poster">

        </div>

    </div>

    <!-- Hero Controls -->

    <button
        class="hero-arrow hero-prev">

        <i class="fa-solid fa-chevron-left"></i>

    </button>

    <button
        class="hero-arrow hero-next">

        <i class="fa-solid fa-chevron-right"></i>

    </button>

    <!-- Pagination -->

    <div
        id="heroPagination"
        class="hero-pagination">

    </div>

    <!-- Scroll Down -->

    <div class="hero-scroll">

        <span>

            Scroll

        </span>

        <i class="fa-solid fa-angle-down"></i>

    </div>

</section>
