<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>KivuStream | Unlimited Movies & TV Shows</title>

    <meta name="description"
          content="Watch Unlimited Movies and TV Shows on KivuStream">

    <link rel="icon"
          href="assets/favicon.ico">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/search.css">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/navbar.css">

    <link rel="stylesheet"
          href="css/hero.css">

    <link rel="stylesheet"
          href="css/cards.css">

    <link rel="stylesheet"
          href="css/sections.css">

    <link rel="stylesheet"
          href="css/footer.css">

    <link rel="stylesheet"
          href="css/responsive.css">

<body>

    <!-- LOADER -->

    <div id="loader"></div>

    <!-- NAVBAR -->

    <div id="navbar"></div>

    <!-- HERO -->

    <header id="hero"></header>

    <!-- MAIN -->

    <main>

        <!-- Continue Watching -->

        <section id="continueWatching"></section>

        <!-- Trending -->

        <section id="trendingMovies"></section>

        <!-- Latest -->

        <section id="latestMovies"></section>

        <!-- Popular -->

        <section id="popularMovies"></section>

        <!-- Top Rated -->

        <section id="topRatedMovies"></section>

        <!-- Action -->

        <section id="actionMovies"></section>

        <!-- Adventure -->

        <section id="adventureMovies"></section>

        <!-- Comedy -->

        <section id="comedyMovies"></section>

        <!-- Horror -->

        <section id="horrorMovies"></section>

        <!-- Sci-Fi -->

        <section id="scifiMovies"></section>

        <!-- Animation -->

        <section id="animationMovies"></section>

        <!-- TV Series -->

        <section id="series"></section>

    </main>

    <!-- FOOTER -->

    <div id="footer"></div>

    <!-- Back To Top -->

    <button id="backToTop">

        <i class="fa-solid fa-chevron-up"></i>

    </button>

    <!-- Search Modal -->

  <div id="searchModal"></div>

    <!-- JS -->

    <script type="module"
            src="js/app.js"></script>

</html>
